[defaults]
remote_tmp = /tmp/ansible-tmp
local_tmp  = /tmp/ansible-tmp
inventory = ./ansible/inventory/hosts.ini
roles_path = ./roles
host_key_checking = False

[connection]
# 🎯 THE FIX: Executes commands directly via standard input piping over the docker socket.
# Bypasses 'mkdir' temporary directory generation inside the containers completely!
pipelining = True